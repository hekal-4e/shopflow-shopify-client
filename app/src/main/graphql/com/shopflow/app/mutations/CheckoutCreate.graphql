mutation CheckoutCreate($input: CheckoutCreateInput!) {
  checkoutCreate(input: $input) {
    checkout {
      id
      webUrl
      totalPrice {
        amount
        currencyCode
      }
      lineItems(first: 20) {
        edges {
          node {
            title
            quantity
            variant {
              title
              price {
                amount
                currencyCode
              }
            }
          }
        }
      }
    }
    checkoutUserErrors {
      code
      field
      message
    }
  }
}
