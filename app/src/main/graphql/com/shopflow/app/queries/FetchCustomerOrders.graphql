query FetchCustomerOrders($accessToken: String!, $first: Int!, $after: String) {
  customer(customerAccessToken: $accessToken) {
    orders(first: $first, after: $after, sortKey: PROCESSED_AT, reverse: true) {
      pageInfo {
        hasNextPage
        endCursor
      }
      edges {
        node {
          id
          orderNumber
          name
          processedAt
          fulfillmentStatus
          totalPrice {
            amount
            currencyCode
          }
          lineItems(first: 10) {
            edges {
              node {
                title
                quantity
                variant {
                  title
                  price {
                    amount
                    currencyCode
                  }
                  image {
                    url
                    altText
                  }
                }
              }
            }
          }
          shippingAddress {
            address1
            address2
            city
            province
            country
            zip
          }
        }
      }
    }
  }
}
